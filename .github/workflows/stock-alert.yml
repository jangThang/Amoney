name: Stock Alert Bot

on:
  schedule:
    # UTC 기준입니다. 한국시간(KST) = UTC + 9시간.
    # 매일 오전 8:50(KST) 실행 = 전날 23:50 UTC
    - cron: '50 23 * * *'
  workflow_dispatch:   # 수동 실행 버튼 (테스트용)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 알림 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # 선택: 없으면 뉴스 제목만
        run: python stock_alert_bot.py
